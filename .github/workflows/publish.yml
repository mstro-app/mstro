name: Publish to npm

on:
  push:
    branches: [main]
    paths:
      - 'package.json'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Update npm for trusted publishing
        run: |
          # Need npm >= 11.5.1 for OIDC trusted publishing.
          # Installing globally (rather than via npx at publish time) ensures
          # OIDC env vars propagate cleanly through prepublishOnly subprocesses.
          #
          # `npm install -g npm@latest` triggers a self-update race that can
          # fail with "Cannot find module 'promise-retry'" — the new arborist
          # files land before their bundled dependencies, and the in-flight
          # install command then loads the half-written tree. Bypass it by
          # replacing the global npm directory with the upstream tarball
          # (which already ships with all bundled deps under node_modules/).
          NPM_VERSION="$(curl -fsSL https://registry.npmjs.org/npm/latest | jq -r '.version')"
          echo "Installing npm@${NPM_VERSION}"
          NPM_DIR="$(npm root -g)/npm"
          rm -rf "${NPM_DIR}"
          mkdir -p "${NPM_DIR}"
          curl -fsSL "https://registry.npmjs.org/npm/-/npm-${NPM_VERSION}.tgz" \
            | tar -xz -C "${NPM_DIR}" --strip-components=1
          npm --version
          # setup-node writes _authToken=${NODE_AUTH_TOKEN}; with no token set
          # this becomes empty and can prevent OIDC fallback. Remove it.
          npm config delete "//registry.npmjs.org/:_authToken" 2>/dev/null || true
          # Silence the deprecation warning on the deprecated always-auth key.
          npm config delete always-auth 2>/dev/null || true

      - name: Check if version changed
        id: version
        run: |
          CURRENT=$(npm view mstro-app version 2>/dev/null || echo "0.0.0")
          NEW=$(node -p "require('./package.json').version")
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "new=$NEW" >> $GITHUB_OUTPUT
          if [ "$CURRENT" = "$NEW" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        if: steps.version.outputs.changed == 'true'
        run: npm ci

      - name: Type check
        if: steps.version.outputs.changed == 'true'
        run: npm run build

      - name: Run tests
        if: steps.version.outputs.changed == 'true'
        run: npm test

      - name: Lint
        if: steps.version.outputs.changed == 'true'
        run: npx @biomejs/biome check .

      - name: Publish to npm
        if: steps.version.outputs.changed == 'true'
        run: npm publish --provenance --access public

      - name: Summary
        run: |
          if [ "${{ steps.version.outputs.changed }}" = "true" ]; then
            echo "### Published mstro-app@${{ steps.version.outputs.new }}" >> $GITHUB_STEP_SUMMARY
            echo "Previous version: ${{ steps.version.outputs.current }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "### No publish needed" >> $GITHUB_STEP_SUMMARY
            echo "Version ${{ steps.version.outputs.current }} already published" >> $GITHUB_STEP_SUMMARY
          fi
